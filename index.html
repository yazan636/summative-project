<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Session Planner</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg,#4facfe,#00f2fe); min-height:100vh; padding:20px; }
        .container { max-width:900px; margin:auto; background:rgba(255,255,255,0.95); padding:20px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.2); }
        h1 { text-align:center; color:#2c3e50; }
        input { padding:10px; margin:5px; border-radius:8px; border:1px solid #ccc; }
        button { padding:10px 15px; background:linear-gradient(45deg,#2c7be5,#00c6ff); color:white; border:none; border-radius:8px; cursor:pointer; transition:0.3s; }
        button:hover { transform:scale(1.05); }
        .assignment { padding:12px; margin-top:10px; border-radius:10px; box-shadow:0 3px 8px rgba(0,0,0,0.1); }
        .high { background:#ffcccc; }
        .medium { background:#fff3cd; }
        .low { background:#d4edda; }
        .done { opacity:0.6; text-decoration:line-through; }
    </style>
</head>
<body>

<div class="container">
    <h1>Study Session Planner</h1>
    <input type="text" id="assignmentName" placeholder="Assignment Name">
    <input type="date" id="dueDate">
    <input type="number" id="studyHours" placeholder="Hours Needed">
    <button onclick="addAssignment()">Add Assignment</button>

    <h2>Most Urgent Task</h2>
    <div id="urgentTask">None</div>

    <h2>Study Plan</h2>
    <div id="assignmentList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
